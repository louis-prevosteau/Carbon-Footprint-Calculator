name: Build & Push Carbon Footprint Calculator

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/carbon-footprint-calculator:latest
            ${{ secrets.DOCKER_USERNAME }}/carbon-footprint-calculator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max